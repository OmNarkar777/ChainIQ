services:
  - type: web
    name: chainiq-api
    runtime: python
    pythonVersion: "3.11"
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/build_train.py && python scripts/build_ingest.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false          # set in Render dashboard → Environment
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CHROMA_PERSIST_DIR
        value: ./chroma_db
      - key: MODEL_STORE_DIR
        value: ./model_store
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: CORS_ORIGINS
        value: "*"
